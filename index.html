<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSWDO Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#1a6b4a', light: '#e6f4ee', mid: '#2e8a61', dark: '#134d35' },
                        sidebar: '#0f2a44'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex">

        <!-- LEFT SIDE -->
        <div class="w-1/2 relative flex flex-col justify-between p-10 overflow-hidden text-white">

            <div class="absolute inset-0 ">
                <img src="https://scontent.fcgy2-2.fna.fbcdn.net/v/t39.30808-6/483063781_651631304475227_7348786853002486040_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=13d280&_nc_eui2=AeHRF_ouEs1AjkdxMMjbDQGVXFhiwtgy4ARcWGLC2DLgBCi_80f8MLTN2NgR7tx3pYp7JRo3eLVONZO1b7VL-G3P&_nc_ohc=-dN2ewb4ai8Q7kNvwGy-VBY&_nc_oc=AdrQlI9-JbhJmSZ8NJyIq1-3c4dWy4k3UGFGgGgIyfnsuG8FlfqJwbkYtvI92N4ntvk&_nc_zt=23&_nc_ht=scontent.fcgy2-2.fna&_nc_gid=v8Pb7xNxkeeS3JHIoYiqCg&_nc_ss=7a3a8&oh=00_Af0IOfWSZFhCl7y_WKsp6CPCqf8jo9bDsjjvNTprzU2LDw&oe=69EE4D56"
                    class="w-full h-full object-cover object-[center_30%] scale-150">
            </div>

            <div class="absolute inset-0 bg-[#0f2a44]/85"></div>

            <div class="relative z-10">
                <br><br><br><br>

                <h1 class="text-5xl font-semibold leading-snug">
                    MSWDO San Enrique<br>
                    Information System
                </h1>

                <p class="text-lg text-gray-200 mt-4">
                    Municipal Social Welfare and Development Office<br>
                    San Enrique, Negros Occidental
                </p>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="w-1/2 flex items-center justify-center bg-gray-100">

            <div class="w-full max-w-md">

                <h2 class="text-2xl font-semibold text-gray-800 mb-2">
                    Welcome back
                </h2>

                <p class="text-sm text-gray-500 mb-6">
                    Sign in to access the MSWDO portal
                </p>

                <!-- Form -->
                <form class="space-y-4">

                    <div>
                        <label class="text-xs text-navy-400">USERNAME</label>
                        <input type="text" placeholder="Enter your username"
                            class="w-full mt-1 px-4 py-3 rounded-md bg-white border border-navy-100 text-navy-700 placeholder-navy-300 focus:outline-none focus:ring-2 focus:ring-gold-400 focus:border-gold-400">
                    </div>

                    <div>
                        <label class="text-xs text-navy-400">PASSWORD</label>
                        <div class="relative mt-1">
                            <input type="password" id="passwordInput" placeholder="Enter your password"
                                class="w-full px-4 py-3 pr-10 rounded-md bg-white border border-navy-100 text-navy-700 placeholder-navy-300 focus:outline-none focus:ring-2 focus:ring-gold-400 focus:border-gold-400">
                            <button type="button" id="togglePassword"
                                class="absolute inset-y-0 right-0 flex items-center px-3 text-navy-400 hover:text-navy-600">
                                <i class="far fa-eye opacity-50" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full mt-1 px-4 py-3 rounded-md bg-gray-800 text-white placeholder-gray-400 focus:outline-none">
                        Sign in
                    </button>

                </form>

                <!-- Footer -->
                <div class="flex justify-end mt-4 text-xs">
                    <a href="#" class="text-blue-500 hover:underline">
                        Forgot password?
                    </a>
                </div>

                <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                    <a href="admindashboard.html" class="hover:underline">
                        Admin Dashboard (Test)
                    </a>
                </div>

                <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                    <a href="mswdohead.html" class="hover:underline">
                        MSWDO Head Dashboard (Test)
                    </a>
                </div>

                <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                    <a href="staffdashboard.html" class="hover:underline">
                        Staff Dashboard (Test)
                    </a>

                </div>

            </div>

        </div>

    </div>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });
    </script>

</body>

</html>
