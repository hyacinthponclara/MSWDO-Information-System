<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSWDO Login</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#1a6b4a', light: '#e6f4ee', mid: '#2e8a61', dark: '#134d35' },
                        sidebar: '#0f2a44'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex">

        <!-- LEFT SIDE -->
        <!-- LEFT SIDE -->
<div class="w-1/2 relative flex flex-col justify-between p-10 overflow-hidden text-white">

    <!-- Background Image -->
    <div class="absolute inset-0">
        <img src="https://scontent.fcgy2-2.fna.fbcdn.net/v/t39.30808-6/483063781_651631304475227_7348786853002486040_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=13d280&_nc_ohc=ZSEUFixIUdEQ7kNvwFFldY1&_nc_oc=AdqRVWCZGOOklyGK3DKALeCwFyxXPN7VvSsBA8uQeDTwXReYlr2UPDESwJOLA_oBVGw&_nc_zt=23&_nc_ht=scontent.fcgy2-2.fna&_nc_gid=QHmQWHsgz7YpeXPy93RV4A&_nc_ss=7a3a8&oh=00_Af215sqS1HYT9igvbWe6BaK2jnJuiCH4KtDEfpQ3_CuRdA&oe=69E431D6"
             class="w-full h-full object-cover object-[center_30%] scale-150">
    </div>

    <!-- Blue Overlay -->
    <div class="absolute inset-0 bg-[#0f2a44]/80"></div>

    <!-- Optional Soft Gradient Glow -->
    <div class="absolute inset-0 bg-gradient-to-br from-blue-500/20 via-transparent to-transparent"></div>

    <!-- Content -->
    <div class="relative z-10">
        <br><br><br><br>

        <h1 class="text-5xl font-semibold leading-snug">
            MSWDO San Enrique<br>
            Information System
        </h1>

        <p class="text-lg text-gray-200 mt-4">
            Municipal Social Welfare and Development Office<br>
            San Enrique, Negros Occidental
        </p>
    </div>

</div>

        <!-- RIGHT SIDE -->
        <div class="w-1/2 flex items-center justify-center bg-gray-100">

            <div class="w-full max-w-md">

                <h2 class="text-2xl font-semibold text-gray-800 mb-2">
                    Welcome back
                </h2>

                <p class="text-sm text-gray-500 mb-6">
                    Sign in to access the MSWDO portal
                </p>

                <!-- Form -->
                <form class="space-y-4">

                    <div>
                        <label class="text-xs text-gray-500">USERNAME</label>
                        <input type="text" placeholder="Enter your username"
                            class="w-full mt-1 px-4 py-3 rounded-md bg-gray-800 text-white placeholder-gray-400 focus:outline-none">
                    </div>

                    <div>
                        <label class="text-xs text-gray-500">PASSWORD</label>
                        <input type="password" placeholder="Enter your password"
                            class="w-full mt-1 px-4 py-3 rounded-md bg-gray-800 text-white placeholder-gray-400 focus:outline-none">
                    </div>

                    <button type="submit" class="w-full py-3 rounded-md bg-gray-300 text-gray-500 cursor-not-allowed">
                        Sign in
                    </button>

                </form>

                <!-- Footer -->
                <div class="flex justify-end mt-4 text-xs">
                    <a href="#" class="text-blue-500 hover:underline">
                        Forgot password?
                    </a>
                </div>

                <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                    <a href="admindashboard.html" class="hover:underline">
                        Admin Dashboard (Test)
                    </a>
                </div>

                <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                    <a href="mswdohead.html" class="hover:underline">
                        MSWDO Head Dashboard (Test)
                    </a>
                </div>

                <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                    <a href="staffdashboard.html" class="hover:underline">
                        Staff Dashboard (Test)
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
